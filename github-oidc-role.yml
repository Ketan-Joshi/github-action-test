# github-oidc-role.yml
# CloudFormation template to create the IAM role for GitHub Actions OIDC auth.
# Deploy this ONCE manually before the pipeline runs:
#   aws cloudformation deploy \
#     --template-file github-oidc-role.yml \
#     --stack-name github-actions-oidc \
#     --capabilities CAPABILITY_NAMED_IAM \
#     --parameter-overrides GitHubOrg=YOUR_ORG GitHubRepo=YOUR_REPO

AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for GitHub Actions OIDC — CDK deployments

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organisation or personal username (e.g. ketanjoshi)
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  AccountId:
    Type: String
    Description: Your AWS Account ID (12 digits)
  CreateOidcProvider:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to true only if GitHub OIDC provider does NOT yet exist in this account

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, 'true']

Resources:
  # Only created if CreateOidcProvider=true
  # Check first: aws iam list-open-id-connect-providers
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  # IAM Role assumed by GitHub Actions
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: github-actions-cdk-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              # Reference existing OIDC provider ARN directly (no circular dependency)
              Federated: !Sub arn:aws:iam::${AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Only allow the specific repo + branch to assume this role
                token.actions.githubusercontent.com:sub:
                  !Sub repo:${GitHubOrg}/${GitHubRepo}:*
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
      Tags:
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Purpose
          Value: GitHub-Actions-CDK-Deploy

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: Add this as AWS_ROLE_ARN secret in GitHub