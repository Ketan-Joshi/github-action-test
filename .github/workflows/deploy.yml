# .github/workflows/deploy.yml
#
# Deployment modes:
#   1. push to develop          -> deploy ALL services to development (uses RELEASE from deployment-trigger repo)
#   2. workflow_dispatch        -> deploy a SINGLE service to chosen environment
#                                  with optional manual image tag override
#
# Image tag resolution (per service):
#   - If image_tag input is provided  -> use it directly
#   - If image_tag is empty           -> fetch from deployment-trigger repo
#                                        branch = appConfig.id (e.g. NginxApp)
#                                        file   = RELEASE
#
# Image is always pulled from ECR:
#   {CDK_DEFAULT_ACCOUNT}.dkr.ecr.{CDK_DEFAULT_REGION}.amazonaws.com/{ecrRepoName}:{tag}
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN              -> IAM role ARN for OIDC
#   CDK_DEFAULT_ACCOUNT       -> AWS account ID
#   CDK_DEFAULT_REGION        -> AWS region
#   HOSTED_ZONE_NAME          -> e.g. cifoinfotech.com
#   DEPLOYMENT_TRIGGER_REPO   -> e.g. Ketan-Joshi/deployment-trigger
#   DEPLOYMENT_TRIGGER_TOKEN  -> GitHub PAT with read access to deployment-trigger repo

name: Deploy CDK Stacks

on:
  push:
    branches:
      - develop    # deploys all services to development
                   # main is protected — production only via PR merge
  pull_request:
    branches:
      - main       # runs cdk diff for production on PRs
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - production
      service_id:
        description: 'App ID to deploy (must match id in ecsApps config e.g. NginxApp)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag (leave empty to auto-fetch from deployment-trigger repo RELEASE file)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Build & Lint ─────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

  # ── Job 2: Resolve environment ──────────────────────────────
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    needs: build
    outputs:
      target_env: ${{ steps.resolve.outputs.target_env }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "target_env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.base_ref }}" == "main" ]; then
            echo "target_env=production" >> $GITHUB_OUTPUT
          else
            echo "target_env=development" >> $GITHUB_OUTPUT
          fi

      - name: Print target environment
        run: echo "Deploying to -> ${{ steps.resolve.outputs.target_env }}"

  # ── Job 3: Resolve image tag (workflow_dispatch only) ───────
  # Fetches tag from deployment-trigger repo if not manually provided
  resolve-image:
    name: Resolve Image Tag
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      full_image: ${{ steps.resolve.outputs.full_image }}
    steps:
      - name: Resolve image tag
        id: resolve
        run: |
          SERVICE_ID="${{ github.event.inputs.service_id }}"
          TAG="${{ github.event.inputs.image_tag }}"
          ACCOUNT="${{ secrets.CDK_DEFAULT_ACCOUNT }}"
          REGION="${{ secrets.CDK_DEFAULT_REGION }}"

          if [ -z "$TAG" ]; then
            echo "No tag provided — fetching RELEASE from deployment-trigger repo..."
            echo "Branch: ${SERVICE_ID}"

            # Fetch RELEASE file from deployment-trigger repo
            # Branch name = appConfig.id (e.g. NginxApp, HttpdApp)
            HTTP_STATUS=$(curl -s -o /tmp/release_response.txt -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.DEPLOYMENT_TRIGGER_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ secrets.DEPLOYMENT_TRIGGER_REPO }}/contents/RELEASE?ref=${SERVICE_ID}")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "ERROR: Could not fetch RELEASE file"
              echo "HTTP status: $HTTP_STATUS"
              echo "Response: $(cat /tmp/release_response.txt)"
              echo "Ensure branch '${SERVICE_ID}' exists in ${{ secrets.DEPLOYMENT_TRIGGER_REPO }}"
              exit 1
            fi

            TAG=$(cat /tmp/release_response.txt | tr -d '[:space:]')
            echo "Fetched tag from deployment-trigger repo: $TAG"
          else
            echo "Using manually provided tag: $TAG"
          fi

          # ECR image URI: {account}.dkr.ecr.{region}.amazonaws.com/{service_id_lowercase}:{tag}
          # ECR repo name = service_id lowercased (NginxApp -> nginxapp)
          ECR_REPO=$(echo "${SERVICE_ID}" | tr '[:upper:]' '[:lower:]')
          FULL_IMAGE="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:${TAG}"

          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

          echo "------------------------------------"
          echo "Service ID:  $SERVICE_ID"
          echo "ECR repo:    $ECR_REPO"
          echo "Tag:         $TAG"
          echo "Full image:  $FULL_IMAGE"
          echo "------------------------------------"

  # ── Job 4: CDK Diff (PR only) ──────────────────────────────
  diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    needs: resolve-env
    if: github.event_name == 'pull_request'
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-CDKDiff-${{ needs.resolve-env.outputs.target_env }}

      - name: Resolve Hosted Zone ID
        id: hosted_zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ secrets.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

      - name: CDK Diff - All Stacks
        id: diff_all
        run: |
          DIFF_OUTPUT=$(npx cdk diff --all \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}" 2>&1 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.resolve-env.outputs.target_env }}';
            const diff = `${{ steps.diff_all.outputs.output }}`;
            const body = [`## CDK Diff - ${env}`, '```', diff, '```'].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Job 5: Deploy Landing Zone ─────────────────────────────
  deploy-landing-zone:
    name: Deploy Landing Zone (${{ needs.resolve-env.outputs.target_env }})
    runs-on: ubuntu-latest
    needs: resolve-env
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-LandingZone-${{ needs.resolve-env.outputs.target_env }}

      - name: Resolve Hosted Zone ID
        id: hosted_zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ secrets.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Resolved hosted zone: $ZONE_ID"

      - name: CDK Bootstrap
        run: |
          npx cdk bootstrap aws://${{ secrets.CDK_DEFAULT_ACCOUNT }}/${{ secrets.CDK_DEFAULT_REGION }} \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}"

      - name: Deploy Landing Zone Stack
        run: |
          npx cdk deploy "${{ needs.resolve-env.outputs.target_env }}-LandingZoneStack" \
            --require-approval never \
            --progress events \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}"

  # ── Job 6: Deploy ECS Cluster ──────────────────────────────
  deploy-ecs-cluster:
    name: Deploy ECS Cluster (${{ needs.resolve-env.outputs.target_env }})
    runs-on: ubuntu-latest
    needs: [resolve-env, deploy-landing-zone]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-EcsCluster-${{ needs.resolve-env.outputs.target_env }}

      - name: Resolve Hosted Zone ID
        id: hosted_zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ secrets.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

      - name: Deploy ECS Cluster Stack
        run: |
          npx cdk deploy "${{ needs.resolve-env.outputs.target_env }}-EcsClusterStack" \
            --require-approval never \
            --progress events \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}"

  # ── Job 7: Deploy ECS Services (push to develop) ───────────
  # Deploys ALL services using tags from deployment-trigger repo
  deploy-ecs-services:
    name: Deploy All ECS Services (development)
    runs-on: ubuntu-latest
    needs: [resolve-env, deploy-ecs-cluster]
    if: github.event_name == 'push'
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-EcsServices-${{ needs.resolve-env.outputs.target_env }}

      - name: Authenticate with ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.CDK_DEFAULT_REGION }} | \
          docker login --username AWS \
            --password-stdin ${{ secrets.CDK_DEFAULT_ACCOUNT }}.dkr.ecr.${{ secrets.CDK_DEFAULT_REGION }}.amazonaws.com

      - name: Resolve Hosted Zone ID
        id: hosted_zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ secrets.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT

      - name: Fetch image tags from deployment-trigger repo and build context args
        id: image_context
        run: |
          ACCOUNT="${{ secrets.CDK_DEFAULT_ACCOUNT }}"
          REGION="${{ secrets.CDK_DEFAULT_REGION }}"
          CONTEXT_ARGS=""

          # Read all app IDs from environment config
          # Each app's RELEASE file is fetched from its branch in deployment-trigger repo
          # Branch name = appConfig.id (e.g. NginxApp, HttpdApp)
          APP_IDS=$(node -e "
            process.env.APP_ENV = '${{ needs.resolve-env.outputs.target_env }}';
            const { config } = require('./shared/config');
            console.log(config.ecsApps.map(a => a.id).join(' '));
          ")

          echo "App IDs: $APP_IDS"

          for APP_ID in $APP_IDS; do
            echo "Fetching RELEASE for: $APP_ID"

            HTTP_STATUS=$(curl -s -o /tmp/release_${APP_ID}.txt -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.DEPLOYMENT_TRIGGER_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ secrets.DEPLOYMENT_TRIGGER_REPO }}/contents/RELEASE?ref=${APP_ID}")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "WARNING: Could not fetch RELEASE for ${APP_ID} (HTTP $HTTP_STATUS) — skipping image override"
              continue
            fi

            TAG=$(cat /tmp/release_${APP_ID}.txt | tr -d '[:space:]')
            ECR_REPO=$(echo "${APP_ID}" | tr '[:upper:]' '[:lower:]')
            FULL_IMAGE="${ACCOUNT}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:${TAG}"

            echo "${APP_ID}: $FULL_IMAGE"
            CONTEXT_ARGS="${CONTEXT_ARGS} --context image-override-${APP_ID}=${FULL_IMAGE}"
          done

          echo "context_args=${CONTEXT_ARGS}" >> $GITHUB_OUTPUT

      - name: Deploy All ECS Service Stacks
        run: |
          npx cdk deploy "${{ needs.resolve-env.outputs.target_env }}-*AppStack" \
            --require-approval never \
            --progress events \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}" \
            ${{ steps.image_context.outputs.context_args }} \
            --ignore-no-stacks

  # ── Job 8: Deploy single service (workflow_dispatch only) ───
  # Deploys ONE specific service with resolved image tag
  deploy-single-service:
    name: Deploy ${{ github.event.inputs.service_id }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [resolve-env, resolve-image, deploy-ecs-cluster]
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-SingleService-${{ github.event.inputs.service_id }}

      - name: Authenticate with ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.CDK_DEFAULT_REGION }} | \
          docker login --username AWS \
            --password-stdin ${{ secrets.CDK_DEFAULT_ACCOUNT }}.dkr.ecr.${{ secrets.CDK_DEFAULT_REGION }}.amazonaws.com

      - name: Resolve Hosted Zone ID
        id: hosted_zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ secrets.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Resolved hosted zone: $ZONE_ID"

      - name: Deploy service stack
        run: |
          SERVICE_ID="${{ github.event.inputs.service_id }}"
          ENV="${{ github.event.inputs.environment }}"
          FULL_IMAGE="${{ needs.resolve-image.outputs.full_image }}"
          STACK_NAME="${ENV}-${SERVICE_ID}Stack"

          echo "Stack:  $STACK_NAME"
          echo "Image:  $FULL_IMAGE"

          npx cdk deploy "$STACK_NAME" \
            --require-approval never \
            --progress events \
            --context "hosted-zone-id=${{ steps.hosted_zone.outputs.zone_id }}" \
            --context "hosted-zone-name=${{ secrets.HOSTED_ZONE_NAME }}" \
            --context "image-override-${SERVICE_ID}=${FULL_IMAGE}"

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ github.event.inputs.service_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ needs.resolve-image.outputs.full_image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ needs.resolve-image.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY