name: Deploy CDK Stacks

on:
  push:
    branches:
      - main       # triggers production deploy
      - develop    # triggers development deploy
  pull_request:
    branches:
      - main
      - develop    # runs cdk diff on PRs to either branch
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Lint + Build ─────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

  # ── Job 2: Resolve target environment ──────────────────────
  # Determines which GitHub Environment to use based on branch
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    needs: build
    outputs:
      target_env: ${{ steps.resolve.outputs.target_env }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "target_env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "target_env=production" >> $GITHUB_OUTPUT
          else
            echo "target_env=development" >> $GITHUB_OUTPUT
          fi

      - name: Print target environment
        run: echo "Deploying to → ${{ steps.resolve.outputs.target_env }}"

  # ── Job 3: CDK Diff (PR only) ──────────────────────────────
  diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    needs: resolve-env
    if: github.event_name == 'pull_request'
    # Uses the environment secrets of whichever branch the PR targets
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-CDKDiff-${{ needs.resolve-env.outputs.target_env }}

      - name: CDK Diff — Landing Zone
        id: diff_lz
        run: |
          DIFF_OUTPUT=$(npx cdk diff LandingZoneStack 2>&1 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: CDK Diff — ECS Apps
        id: diff_ecs
        run: |
          DIFF_OUTPUT=$(npx cdk diff EcsAppsStack 2>&1 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ needs.resolve-env.outputs.target_env }}';
            const lzDiff = `${{ steps.diff_lz.outputs.output }}`;
            const ecsDiff = `${{ steps.diff_ecs.outputs.output }}`;
            const body = [
              `## CDK Diff — ${env}`,
              '',
              '### LandingZoneStack',
              '```',
              lzDiff,
              '```',
              '',
              '### EcsAppsStack',
              '```',
              ecsDiff,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Job 4: Deploy Landing Zone ─────────────────────────────
  deploy-landing-zone:
    name: Deploy Landing Zone (${{ needs.resolve-env.outputs.target_env }})
    runs-on: ubuntu-latest
    needs: resolve-env
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    # Automatically picks the right secrets based on the resolved environment
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-LandingZone-${{ needs.resolve-env.outputs.target_env }}

      - name: CDK Bootstrap
        run: npx cdk bootstrap aws://${{ secrets.CDK_DEFAULT_ACCOUNT }}/${{ secrets.CDK_DEFAULT_REGION }}

      - name: Deploy Landing Zone Stack
        run: npx cdk deploy "${{ needs.resolve-env.outputs.target_env }}-LandingZoneStack" --require-approval never --progress events

  # ── Job 5: Deploy ECS Apps ─────────────────────────────────
  deploy-ecs-apps:
    name: Deploy ECS Apps (${{ needs.resolve-env.outputs.target_env }})
    runs-on: ubuntu-latest
    needs: [resolve-env, deploy-landing-zone]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ needs.resolve-env.outputs.target_env }}
    env:
      CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
      CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
      APP_ENV: ${{ needs.resolve-env.outputs.target_env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-EcsApps-${{ needs.resolve-env.outputs.target_env }}

      - name: Deploy ECS Apps Stack
        run: npx cdk deploy "${{ needs.resolve-env.outputs.target_env }}-EcsAppsStack" --require-approval never --progress events