# .github/workflows/deploy.yml
# Deploys CDK stacks to AWS via GitHub Actions
# Required GitHub Secrets:
#   AWS_ROLE_ARN          — IAM role ARN to assume via OIDC (preferred over keys)
#   CDK_DEFAULT_ACCOUNT   — AWS account ID
#   CDK_DEFAULT_REGION    — AWS region (e.g. ap-southeast-2)

name: Deploy CDK Stacks

on:
  push:
    branches:
      - main          # auto-deploy on merge to main
  pull_request:
    branches:
      - main          # run cdk diff on PRs (no deploy)
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  id-token: write   # required for OIDC auth
  contents: read
  pull-requests: write  # for posting diff as PR comment

env:
  CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
  CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Lint + Build ─────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npm run build

  # ── Job 2: CDK Diff (PR only) ──────────────────────────────
  diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-CDKDiff

      - name: CDK Diff — Landing Zone
        id: diff_lz
        run: |
          DIFF_OUTPUT=$(npx cdk diff LandingZoneStack 2>&1 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: CDK Diff — ECS Apps
        id: diff_ecs
        run: |
          DIFF_OUTPUT=$(npx cdk diff EcsAppsStack 2>&1 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const lzDiff = `${{ steps.diff_lz.outputs.output }}`;
            const ecsDiff = `${{ steps.diff_ecs.outputs.output }}`;
            const body = [
              '## CDK Diff',
              '',
              '### LandingZoneStack',
              '```',
              lzDiff,
              '```',
              '',
              '### EcsAppsStack',
              '```',
              ecsDiff,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Job 3: Deploy Landing Zone ─────────────────────────────
  deploy-landing-zone:
    name: Deploy Landing Zone
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-LandingZone

      - name: CDK Bootstrap (idempotent — safe to run every time)
        run: npx cdk bootstrap aws://${{ secrets.CDK_DEFAULT_ACCOUNT }}/${{ secrets.CDK_DEFAULT_REGION }}

      - name: Deploy Landing Zone Stack
        run: npx cdk deploy LandingZoneStack --require-approval never --progress events

  # ── Job 4: Deploy ECS Apps ─────────────────────────────────
  deploy-ecs-apps:
    name: Deploy ECS Apps
    runs-on: ubuntu-latest
    needs: deploy-landing-zone   # always deploy landing zone first
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.CDK_DEFAULT_REGION }}
          role-session-name: GitHubActions-EcsApps

      - name: Deploy ECS Apps Stack
        run: npx cdk deploy EcsAppsStack --require-approval never --progress events
